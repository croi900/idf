repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.0
    hooks:
      - id: clang-format
        types_or: [c++, c]
        files: ^(src/|main\.cpp)

  - repo: local
    hooks:
      - id: idf-build
        name: idf build check
        entry: scripts/check_build.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
