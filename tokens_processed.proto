syntax = "proto3";

package idf;


message TokenEntry {
    bytes  token  = 1;
    uint64 id     = 2;
}


message TokenOccurrence {
    uint64 token_id   = 1;
    uint64 position   = 2;
    uint64 file_hash  = 3;
}



message TokensProcessed {
    repeated TokenEntry      entries     = 1;
    repeated TokenOccurrence occurrences = 2;
}
